<!--
  ═══════════════════════════════════════════════════════════════
  NEBULA — SHA-256 LICENSE VERIFICATION SNIPPET
  Paste this block just before the closing </body> tag in index.html
  ═══════════════════════════════════════════════════════════════

  HOW IT WORKS:
  1. On page load, check localStorage — if already activated, do nothing.
  2. If not activated, show the activation overlay.
  3. User enters a key → browser hashes it with SHA-256 (Web Crypto API).
  4. The hashed value is compared against the remote list of hashes.
  5. Match found → save activation state + reload. No match → show error.

  KEY FACTS:
  • Raw license keys are NEVER sent over the network.
  • Only the SHA-256 hash of the input is compared against the remote list.
  • The remote TXT file contains only hashes — safe to be public.
  • localStorage key: 'nebula_activated' = "true"
  • Cache TTL: 24 hours (re-verifies once per day).
  ═══════════════════════════════════════════════════════════════
-->

<!-- ── Activation Overlay UI ──────────────────────────────── -->
<div id="nebula-license-overlay" style="display:none;">
  <div id="nebula-license-box">
    <div id="nebula-license-logo">&#9733;</div>
    <div id="nebula-license-title">Activate Nebula</div>
    <div id="nebula-license-sub">
      Enter your license key to unlock the application.<br>
      An internet connection is required for verification.
    </div>
    <label id="nebula-license-label" for="nebula-license-input">License Key</label>
    <input
      id="nebula-license-input"
      type="text"
      placeholder="XXXX-XXXX-XXXX-XXXX"
      spellcheck="false"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="characters"
      maxlength="60"
    >
    <button id="nebula-license-btn">Activate</button>
    <div id="nebula-license-status"></div>
    <div id="nebula-license-footer">Need a key? Contact your administrator.</div>
  </div>
</div>

<!-- ── Overlay Styles ─────────────────────────────────────── -->
<style>
  /* Backdrop */
  #nebula-license-overlay {
    position: fixed; inset: 0; z-index: 2147483647;
    background: #0b0f17;
    display: flex; align-items: center; justify-content: center;
    font-family: "Inter", "Tajawal", "Cairo", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  /* Card */

    border: 1px solid rgba(168, 85, 247, 0.28);
    border-radius: 22px;

  }

    background: linear-gradient(135deg, #a855f7, #f472b6);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 32px rgba(168,85,247,0.5);
    margin-bottom: 24px; font-size: 26px;
  }
  /* Title */
  #nebula-license-title {
    font-size: 23px; font-weight: 800; color: #f0f4f8;

  }
  /* Subtitle */
  #nebula-license-sub {
    font-size: 13px; color: #64748b;
    margin-bottom: 32px; text-align: center; line-height: 1.65;
  }
  /* Label */
  #nebula-license-label {
    width: 100%; font-size: 11.5px; font-weight: 700; color: #94a3b8;
    text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 9px;
  }
  /* Input */
  #nebula-license-input {
    width: 320px; max-width: 100%;

  /* Activate button */

  /* Status message area */
  #nebula-license-status {
    margin-top: 13px; min-height: 38px;

  #nebula-license-footer {
    margin-top: 26px; font-size: 11px;
    color: #2d3a50; text-align: center; line-height: 1.6;
  }
</style>

<!-- ── Verification Script ────────────────────────────────── -->
<script>
(function () {
  'use strict';

  /* ── CONFIGURATION ─────────────────────────────────────────
     HASH_URL  : URL of your remote TXT file (one SHA-256 hash per line).
     LS_KEY    : localStorage flag written on successful activation.
     CACHE_KEY : localStorage record storing the verified hash + timestamp.
     TTL_MS    : How long (ms) a verified session is trusted before re-checking.
  ────────────────────────────────────────────────────────── */
  var HASH_URL  = 'https://cdn.jsdelivr.net/gh/fairytaledesign41-ism/nepulahabits@main/nebula-license-hashes.txt';
  var LS_KEY    = 'nebula_activated';
  var CACHE_KEY = 'nebula_lic_cache';
  var TTL_MS    = 24 * 60 * 60 * 1000; // 24 hours

  /* ── localStorage helpers ──────────────────────────────── */
  function lsGet(k)    { try { return localStorage.getItem(k); }    catch (e) { return null; } }
  function lsSet(k, v) { try { localStorage.setItem(k, v); }        catch (e) {} }

  /* ── SHA-256 via Web Crypto API ────────────────────────────
     Input is normalised (trim + uppercase) before hashing so it
     matches exactly what nebula-hash-generator.js produces.
  ────────────────────────────────────────────────────────── */
  function sha256(plainText) {
    var normalized = plainText.trim().toUpperCase();
    var encoded    = new TextEncoder().encode(normalized);
    return crypto.subtle.digest('SHA-256', encoded).then(function (buffer) {
      return Array.from(new Uint8Array(buffer))
        .map(function (byte) { return ('00' + byte.toString(16)).slice(-2); })
        .join('');
    });
  }

  /* ── Fetch remote hash list ────────────────────────────────
     Returns a Set of lowercase 64-char hex strings.
     Only lines that are exactly 64 hex characters are accepted —
     blank lines and comments are silently ignored.
  ────────────────────────────────────────────────────────── */
  function fetchHashList() {
    return fetch(HASH_URL, { cache: 'no-store' })
      .then(function (response) {
        if (!response.ok) throw new Error('HTTP ' + response.status);
        return response.text();
      })
      .then(function (text) {
        var hashSet = new Set();
        text.split(/\r?\n/).forEach(function (line) {
          var h = line.trim().toLowerCase();
          if (/^[0-9a-f]{64}$/.test(h)) hashSet.add(h); // strict SHA-256 format
        });
        return hashSet;
      });
  }

  /* ── UI helpers ────────────────────────────────────────── */
  function setStatus(type, html) {
    var el = document.getElementById('nebula-license-status');
    if (!el) return;
    el.className = 'show ' + type;
    el.innerHTML = html;
  }
  function clearStatus() {
    var el = document.getElementById('nebula-license-status');
    if (el) { el.className = ''; el.innerHTML = ''; }
  }
  function setLocked(locked) {
    var inp = document.getElementById('nebula-license-input');
    var btn = document.getElementById('nebula-license-btn');
    if (inp) inp.disabled = locked;
    if (btn) btn.disabled = locked;
  }
  function resetInputStyle() {
    var inp = document.getElementById('nebula-license-input');
    if (inp) { inp.style.borderColor = ''; inp.style.boxShadow = ''; }
  }

  /* ── Check activation state ────────────────────────────────
     Accepts activation if either:
     (a) The legacy flat flag 'nebula_activated' = "true" exists, OR
     (b) A cache record exists and is within the TTL window.
  ────────────────────────────────────────────────────────── */
  function isActivated() {
    if (lsGet(LS_KEY) === 'true') return true;
    var saved = lsGet(CACHE_KEY);
    if (!saved) return false;
    try {
      var record = JSON.parse(saved);
      return !!(record && record.hash && record.ts &&
                (Date.now() - record.ts) < TTL_MS);
    } catch (e) { return false; }
  }

  /* ── Initialise overlay ────────────────────────────────────
     If already activated: hide overlay immediately and exit.
     If not: show overlay and focus the input field.
  ────────────────────────────────────────────────────────── */
  var overlay = document.getElementById('nebula-license-overlay');

  if (isActivated()) {
    if (overlay) overlay.style.display = 'none';
    return; // ← early exit; rest of this script does not run
  }

  if (overlay) overlay.style.display = 'flex';
  var autoFocusInput = document.getElementById('nebula-license-input');
  if (autoFocusInput) setTimeout(function () { autoFocusInput.focus(); }, 150);

  /* ── verifyLicense — core verification function ────────────
     1. Read and normalise the user's input.
     2. Hash it with SHA-256 using the Web Crypto API.
     3. Fetch the remote hash list from HASH_URL.
     4. Check if the computed hash exists in the list.
     5a. HIT  → persist activation state + reload the page.
     5b. MISS → show "Invalid" error and re-enable the form.
     5c. ERROR → show network warning and re-enable the form.
  ────────────────────────────────────────────────────────── */
  function verifyLicense() {
    // Safety guard: already activated → just reload
    if (isActivated()) { location.reload(); return; }

    var inputEl = document.getElementById('nebula-license-input');
    if (!inputEl) return;

    var userInput = inputEl.value.trim().toUpperCase();
    if (!userInput) {
      setStatus('warn', '<span>&#9888;</span> Please enter your license key.');
      inputEl.focus();
      return;
    }

    // Lock the form while verifying
    setLocked(true);
    setStatus('info', '<div class="_nlic_spinner_"></div><span>Verifying license&hellip;</span>');

    // Step 1: hash the input
    sha256(userInput)
      .then(function (computedHash) {
        // Step 2: fetch the remote hash list
        return fetchHashList().then(function (hashSet) {
          return { hash: computedHash, valid: hashSet.has(computedHash) };
        });
      })
      .then(function (result) {
        if (result.valid) {
          /* ✔ VALID KEY ─ persist and reload */
          lsSet(LS_KEY, 'true');
          lsSet(CACHE_KEY, JSON.stringify({ hash: result.hash, ts: Date.now() }));
          setStatus('ok', '<span>&#10004;</span> License verified! Loading&hellip;');
          setTimeout(function () { location.reload(); }, 900);

        } else {
          /* ✘ INVALID KEY */
          setLocked(false);
          setStatus('err',
            '<svg width="14" height="14" viewBox="0 0 14 14" fill="none">' +
              '<circle cx="7" cy="7" r="6.25" stroke="#ef4444" stroke-width="1.5"/>' +
              '<line x1="7" y1="4" x2="7" y2="7.5" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>' +
              '<circle cx="7" cy="9.5" r="0.75" fill="#ef4444"/>' +
            '</svg> Invalid license key. Please try again.');
          alert('Invalid license key!');
          // Highlight the input field red
          inputEl.style.borderColor = 'rgba(239,68,68,0.6)';
          inputEl.style.boxShadow   = '0 0 0 3px rgba(239,68,68,0.12)';
          inputEl.select();
        }
      })
      .catch(function (error) {
        /* ⚠ NETWORK / FETCH ERROR */
        setLocked(false);
        setStatus('warn',
          '<svg width="14" height="14" viewBox="0 0 14 14" fill="none">' +
            '<circle cx="7" cy="7" r="6.25" stroke="#fbbf24" stroke-width="1.5"/>' +
            '<line x1="7" y1="4" x2="7" y2="7.5" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>' +
            '<circle cx="7" cy="9.5" r="0.75" fill="#fbbf24"/>' +
          '</svg> Could not reach the license server. Check your connection and retry.');
        console.warn('[Nebula License] Fetch error:', error);
      });
  }

  /* ── Event listeners ───────────────────────────────────── */
  var activateBtn = document.getElementById('nebula-license-btn');
  var keyInput    = document.getElementById('nebula-license-input');

  // Click the Activate button
  if (activateBtn) activateBtn.addEventListener('click', verifyLicense);

  // Press Enter inside the input field
  if (keyInput) {
    keyInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { verifyLicense(); return; }
      // Clear error styling on any new keystroke
      clearStatus();
      resetInputStyle();
    });
  }

})(); // end IIFE
</script>
